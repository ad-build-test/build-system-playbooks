name: Request Deployment

on:
  workflow_call:
    inputs:
      deploy_to_dev:
        description: 'DEV'
        required: false
        type: boolean
        default: false
      deploy_to_lcls:
        description: 'LCLS'
        required: false
        type: boolean
        default: false
      deploy_to_facet:
        description: 'FACET'
        required: false
        type: boolean
        default: false
      deploy_to_testfac:
        description: 'TESTFAC'
        required: false
        type: boolean
        default: false
      deploy_to_sandbox:
        description: 'SANDBOX'
        required: false
        type: boolean
        default: false
      deploy_to_container_dev:
        description: 'CONTAINER_DEV'
        required: false
        type: boolean
        default: false
      deploy_to_container_prod:
        description: 'CONTAINER_PROD'
        required: false
        type: boolean
        default: false
      tag:
        description: 'Tag to deploy'
        required: true
        type: string
      playbook:
        description: 'Deployment playbook (e.g., pydm_module/pydm_deploy.yml, epics-ioc_module/epics_ioc_deploy.yml, container_module/container_deploy.yml)'
        required: true
        type: string
      docker_network:
        description: 'Docker network name for inter-container DNS (container deployments)'
        required: false
        type: string
        default: ''
      migration_command:
        description: 'Database migration command (e.g., alembic upgrade head). Skipped if empty.'
        required: false
        type: string
        default: ''
      health_check_path:
        description: 'Health check endpoint path (default: /health)'
        required: false
        type: string
        default: '/health'
      artifact_url:
        description: 'URL to download artifact (for app deployments)'
        required: false
        type: string
        default: ''
      artifact_type:
        description: 'Artifact type: rpm, tar, zip (for app deployments)'
        required: false
        type: string
        default: 'rpm'
    secrets:
      database_url:
        required: false
      redis_url:
        required: false

permissions:
  deployments: write
  contents: read
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      facilities: ${{ steps.build-matrix.outputs.facilities }}
    steps:
      - name: Build Facility Matrix
        id: build-matrix
        run: |
          FACILITIES="["
          [ "${{ inputs.deploy_to_dev }}" == "true" ] && FACILITIES="${FACILITIES}\"DEV\","
          [ "${{ inputs.deploy_to_lcls }}" == "true" ] && FACILITIES="${FACILITIES}\"LCLS\","
          [ "${{ inputs.deploy_to_facet }}" == "true" ] && FACILITIES="${FACILITIES}\"FACET\","
          [ "${{ inputs.deploy_to_testfac }}" == "true" ] && FACILITIES="${FACILITIES}\"TESTFAC\","
          [ "${{ inputs.deploy_to_sandbox }}" == "true" ] && FACILITIES="${FACILITIES}\"SANDBOX\","
          [ "${{ inputs.deploy_to_container_dev }}" == "true" ] && FACILITIES="${FACILITIES}\"CONTAINER_DEV\","
          [ "${{ inputs.deploy_to_container_prod }}" == "true" ] && FACILITIES="${FACILITIES}\"CONTAINER_PROD\","

          # Remove trailing comma and close array
          FACILITIES="${FACILITIES%,}]"

          # Check if empty
          if [ "$FACILITIES" == "[]" ]; then
            echo "Error: No facilities selected"
            exit 1
          fi

          echo "facilities=$FACILITIES" >> $GITHUB_OUTPUT
          echo "Selected facilities: $FACILITIES"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        facility: ${{ fromJson(needs.prepare.outputs.facilities) }}
      fail-fast: false
    steps:
      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.database_url }}"
          echo "::add-mask::${{ secrets.redis_url }}"

      - name: Create GitHub Deployment for ${{ matrix.facility }}
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const payload = {
              facility: '${{ matrix.facility }}',
              tag: '${{ inputs.tag }}',
              user: '${{ github.actor }}',
              playbook: '${{ inputs.playbook }}'
            };

            const dockerNetwork = '${{ inputs.docker_network }}';
            if (dockerNetwork) payload.docker_network = dockerNetwork;

            const migrationCmd = '${{ inputs.migration_command }}';
            if (migrationCmd) payload.migration_command = migrationCmd;

            const healthPath = '${{ inputs.health_check_path }}';
            if (healthPath) payload.health_check_path = healthPath;

            const dbUrl = '${{ secrets.database_url }}';
            if (dbUrl) payload.database_url = dbUrl;

            const redisUrl = '${{ secrets.redis_url }}';
            if (redisUrl) payload.redis_url = redisUrl;

            const artifactUrl = '${{ inputs.artifact_url }}';
            if (artifactUrl) payload.artifact_url = artifactUrl;

            const artifactType = '${{ inputs.artifact_type }}';
            if (artifactType) payload.artifact_type = artifactType;

            const deployRef = '${{ inputs.tag }}' || context.sha;

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: deployRef,
              environment: '${{ matrix.facility }}',
              required_contexts: [],
              auto_merge: false,
              payload: payload,
              description: 'Deploying ${{ inputs.tag }} to ${{ matrix.facility }}'
            });

            console.log('Deployment created for ${{ matrix.facility }}: ID', deployment.data.id);
            return deployment.data.id;
