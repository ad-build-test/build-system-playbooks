; Facilities Global Inventory *used by all deployment playbooks
; This file specifies the servers for each facility and the relevant paths for deployment locations.

; SANDBOX is used for testing purposes for now
[SANDBOX]
sandbox ansible_host=devlogin ansible_user=adbuild
; adbuild@devlogin.slac.stanford.edu 

[DEV]
devlogin ansible_user=adbuild 
; adbuild@devlogin.slac.stanford.edu 

; TODO: For production facilities, we need to ask ken brobeck to add adbuild 
