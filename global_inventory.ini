; ======= Container Deployment Hosts =======

[CONTAINER_DEV]
container-dev-01 ansible_host=lcls-dev9 ansible_user=adbuild

[CONTAINER_PROD]
container-prod-01 ansible_host=lcls-srv04 ansible_user=softegr

[CONTAINER_DEV:vars]
ansible_ssh_common_args="-o ProxyJump=adbuild@devlogin -o StrictHostKeyChecking=no"
deploy_base=/afs/slac/g/lcls/tools/containers
api_port=8080
api_workers=2
worker_replicas=2
ghcr_registry=ghcr.io/ad-build-test
; App-specific vars (docker_network, migration_command, health_check_path)
; are passed via --extra-vars at runtime, not here

[CONTAINER_PROD:vars]
ansible_ssh_common_args="-o ProxyJump=adbuild@mcclogin -o StrictHostKeyChecking=no"
deploy_base=/afs/slac/g/lcls/tools/containers
api_port=8080
api_workers=4
worker_replicas=4
ghcr_registry=ghcr.io/ad-build-test
; App-specific vars (docker_network, migration_command, health_check_path)
; are passed via --extra-vars at runtime, not here
